<!DOCTYPE html>
<html>

<head>
    <title>Gesture Video Player</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="player-container">

        <video id="videoPlayer" width="700" controls>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>

        <div class="overlay">

            <div id="left"></div>

            <div id="center"></div>

            <div id="right"></div>

        </div>

    </div>

    <div id="comments">
        <h2>Comments Section Opened</h2>
    </div>

    <script src="script.js"></script>

</body>

</html>
